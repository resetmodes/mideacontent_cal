name: 팀즈 아침 브리핑

# 매일 08:00 KST (= 전날 23:00 UTC) 팀즈 채널로 요약 발송 + 수동 실행(Run workflow).
# 내용: 오늘 촬영 · RMN 세금계산서/가부킹 전환 · 신규 등록 일정 (없으면 발송 생략).
# 시크릿: TEAMS_WEBHOOK_URL(필수) · SUPABASE_SERVICE_KEY(권장 — 없으면 RMN 섹션 생략)
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: teams-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 브리핑 발송
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/notify/daily-brief.mjs
