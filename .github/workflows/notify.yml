name: 팀즈 아침 브리핑

# 매일 08:00 KST (= 전날 23:00 UTC) 팀즈 채널로 요약 발송 + 수동 실행(Run workflow).
# 내용: ① 오늘 촬영 ② 오늘 업로드 콘텐츠 ③ RMN 확인(가부킹 전환·세금계산서) — 없으면 발송 생략.
# 시크릿: TEAMS_WEBHOOK_URL(필수) · SUPABASE_SERVICE_KEY(권장 — 없으면 RMN 섹션 생략)
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: teams-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 브리핑 발송
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # 수동 실행(Run workflow)은 내용이 없어도 테스트 카드 강제 발송, 정기(cron)는 빈 날 생략
          ALWAYS_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node scripts/notify/daily-brief.mjs
