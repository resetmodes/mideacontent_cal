name: 팀즈 아침 브리핑

# 평일(월~금) 09:00 KST (= 00:00 UTC) 팀즈 채널로 요약 발송 + 수동 실행(Run workflow).
# 공휴일은 스크립트가 HOLIDAYS(src/data/holidays.js) 대조로 발송 생략.
# 내용 ('26.7 확정): ① 오늘 팀원 일정(업무 제외) ② 오늘 촬영 일정 ③ 오늘 매체 일정
#   — 비는 섹션은 "일정 없음" 표기, 카드는 평일 매일 발송.
# 시크릿: TEAMS_WEBHOOK_URL(필수) · SUPABASE_SERVICE_KEY(권장 — 일정 조회용)
on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: teams-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 브리핑 발송
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # 수동 실행(Run workflow)은 내용이 없어도 테스트 카드 강제 발송, 정기(cron)는 빈 날 생략
          ALWAYS_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node scripts/notify/daily-brief.mjs
