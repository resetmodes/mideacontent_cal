name: SNS 데이터 수집

# 주 1회 자동 + 수동 실행 가능
on:
  schedule:
    # 매주 월요일 00:00 UTC = 월요일 09:00 KST
    - cron: '0 0 * * 1'
  workflow_dispatch: {}   # Actions 탭 'Run workflow' 버튼으로 수동 실행

permissions:
  contents: write

concurrency:
  group: sns-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 수집 + 정제 (인스타 + 유튜브)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node scripts/sns/scrape-instagram.mjs
          node scripts/sns/clean-instagram.mjs
          node scripts/sns/scrape-youtube.mjs
          node scripts/sns/clean-youtube.mjs

      # schedule/수동 트리거라 데이터 커밋이 워크플로를 재트리거하지 않음.
      # push 되면 Vercel이 자동 재배포.
      - name: 변경된 데이터 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/sns/instagram.js src/data/sns/youtube.js
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore(data): 주간 SNS 데이터 자동 갱신"
            git push
          fi
