<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매체 스펙 라이브러리 — 미디어콘텐츠팀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --ink:#111111; --paper:#ffffff; --green:#0B4336;
    --grey:#8a8a8a; --hairline:#d9d9d9; --red:#C4372C; --hl:#EDFF5B;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
    background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:0 20px 120px;}

  header{padding:44px 0 0;}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--green);text-transform:uppercase;}
  h1{font-size:clamp(30px,6vw,44px);font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin:6px 0 4px;}
  .masthead-sub{font-size:13px;color:var(--grey);}
  .draft-note{margin-top:18px;font-size:12.5px;line-height:1.55;
    border-top:2px solid var(--ink);border-bottom:1px solid var(--hairline);padding:10px 0;}
  .draft-note b{background:var(--hl);font-weight:700;padding:0 3px;}

  .controls{position:sticky;top:0;background:var(--paper);z-index:10;padding:14px 0 0;border-bottom:1px solid var(--ink);}
  .search{width:100%;border:none;border-bottom:1px solid var(--hairline);font-family:inherit;
    font-size:17px;font-weight:500;padding:8px 0;outline:none;background:transparent;color:var(--ink);}
  .search::placeholder{color:#bbb;font-weight:400;}
  .search:focus{border-bottom-color:var(--green);}
  .filters{display:flex;gap:18px;overflow-x:auto;padding:12px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .filters::-webkit-scrollbar{display:none;}
  .filters button{background:none;border:none;font-family:inherit;cursor:pointer;font-size:13.5px;
    font-weight:500;color:var(--grey);white-space:nowrap;padding:2px 0;letter-spacing:-0.01em;}
  .filters button.on{color:var(--ink);font-weight:800;box-shadow:inset 0 -8px 0 var(--hl);}
  .count{font-size:11.5px;color:var(--grey);padding:0 0 10px;}

  .group-label{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--green);
    padding:34px 0 6px;border-bottom:2px solid var(--ink);}
  .group-note{font-size:12.5px;color:var(--grey);line-height:1.6;padding:8px 0 2px;}
  .group-note b{color:var(--ink);font-weight:700;}
  .group-note .ban-inline{color:var(--red);font-weight:600;}

  .media{border-bottom:1px solid var(--hairline);}
  .media-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:20px 0;cursor:pointer;user-select:none;}
  .media-head:active{opacity:.6;}
  .m-id{flex:1;min-width:0;}
  .m-cat{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--green);}
  .m-cat .reg{color:var(--ink);}
  .m-name{font-size:20px;font-weight:800;letter-spacing:-0.02em;line-height:1.25;}
  .m-preview{text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .m-size{font-size:14px;font-weight:700;letter-spacing:-0.01em;}
  .m-due{font-size:11.5px;color:var(--grey);margin-top:2px;}
  .m-due b{color:var(--ink);font-weight:700;}

  .media-body{display:none;padding:0 0 30px;}
  .media.open .media-body{display:block;}
  .media.open{border-bottom:2px solid var(--ink);}
  .m-target{font-size:13.5px;line-height:1.6;padding:2px 0 14px;color:#444;}

  .slot{border-top:1px solid var(--ink);padding:14px 0 18px;}
  .slot-name{font-size:12px;font-weight:800;letter-spacing:.06em;color:var(--green);}
  .slot-hero{font-size:clamp(28px,6.5vw,42px);font-weight:800;letter-spacing:-0.03em;line-height:1.05;
    font-variant-numeric:tabular-nums;padding:4px 0 6px;}
  .slot-hero small{font-size:.4em;font-weight:600;color:var(--grey);letter-spacing:0;margin-left:6px;}
  .slot-meta{font-size:13.5px;font-variant-numeric:tabular-nums;color:#333;}
  .slot-meta b{font-weight:700;}
  .slot-note{font-size:12px;color:var(--grey);margin-top:3px;}

  .spec-grid{display:grid;grid-template-columns:88px 1fr;margin-top:6px;border-top:1px solid var(--ink);}
  .spec-grid dt{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--green);padding:11px 0;border-bottom:1px solid var(--hairline);}
  .spec-grid dd{font-size:14px;padding:10px 0;border-bottom:1px solid var(--hairline);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;}
  dt.ban{color:var(--red);}
  dd.ban{color:var(--red);font-weight:500;}
  mark{background:var(--hl);color:inherit;}
  .src{font-size:11.5px;color:var(--grey);margin-top:10px;}
  .src.draft b{background:var(--hl);padding:0 3px;color:var(--ink);}

  .empty{padding:60px 0;text-align:center;color:var(--grey);font-size:14px;}
  footer{margin-top:60px;font-size:12px;color:var(--grey);border-top:2px solid var(--ink);padding-top:12px;}
  @media (max-width:560px){
    .m-preview{display:none;}
    .spec-grid{grid-template-columns:80px 1fr;}
  }
  @media print{.controls{position:static;} .media-body{display:block;}}
</style>
</head>

   slots:[{name:"기본", size:"1080 × 1920", cap:"90초 이내", fmt:"MP4 · MOV"}],
   extra:{"심의":"내부 검수 (brand-guard 기준)","금지사항":"주류 주 소재 금지 · 협찬 시 유료광고 라벨 필수","담당":"SNS 운영 파트","비고":"커버 1080×1350 별도"}},
  {group:"운영 매체", cat:"SNS", name:"인스타그램 피드", lead:"D-2", verified:false,
   slots:[{name:"기본", size:"1080 × 1350", cap:"캐러셀 최대 20장", fmt:"JPG · PNG"}],
   extra:{"심의":"내부 검수","금지사항":"지점 사고 사례 언급 시 익명화","담당":"SNS 운영 파트"}},
  {group:"운영 매체", cat:"유튜브", name:"유튜브 (와짓 외)", lead:"D-5", verified:false,
   slots:[{name:"기본", size:"1920 × 1080", cap:"제한 없음", fmt:"MP4 · 4K 권장"}],
   extra:{"심의":"내부 검수","금지사항":"음원 저작권 라이선스 확인 필수","담당":"유튜브 운영 파트","비고":"썸네일 1280×720 · 2MB 이하"}},
  {group:"운영 매체", cat:"인쇄·고지물", name:"신문 15단 광고", lead:"D-4", verified:false,
   slots:[{name:"기본", size:"370 × 510 mm", cap:"—", fmt:"PDF/X-1a (CMYK)"}],
   extra:{"심의":"매체사 심의","금지사항":"신문광고 자율심의 규정 준수","담당":"매거진·유튜브 파트","비고":"재단 여백 3mm · 별색 불가"}},
  {group:"운영 매체", cat:"인쇄·고지물", name:"고지물 (PMS)", lead:"D-7", verified:false,
   slots:[{name:"기본", size:"210 × 297 mm", cap:"—", fmt:"PDF (CMYK)"}],
   extra:{"심의":"내부 검수","금지사항":"경품·사은 법정 문구 필수","담당":"매거진·유튜브 파트","비고":"보이스가이드 병행 — 원고 별도"}}
];

const cats = ["전체","타겟형 매체",...new Set(MEDIA.filter(m=>m.group!=="타겟형 매체").map(m=>m.cat))];
let activeCat="전체", query="";

const $f=document.getElementById('filters');
cats.forEach(c=>{
  const b=document.createElement('button');
  b.textContent=c;
  if(c===activeCat)b.classList.add('on');
  b.onclick=()=>{activeCat=c;[...$f.children].forEach(x=>x.classList.toggle('on',x.textContent===c));render();};
  $f.appendChild(b);
});
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim();render();});

function hl(t){
  if(!query||!t)return t||'';
  const i=t.toLowerCase().indexOf(query.toLowerCase());
  if(i<0)return t;
  return t.slice(0,i)+'<mark>'+t.slice(i,i+query.length)+'</mark>'+t.slice(i+query.length);
}
function haystack(m){
  return [m.name,m.cat,m.group,m.reg||'',m.target||'',
    ...m.slots.map(s=>[s.name,s.size,s.fmt,s.note||''].join(' ')),
    ...(m.extra?Object.values(m.extra):[])].join(' ').toLowerCase();
}

function render(){
  const list=document.getElementById('list');
  list.innerHTML='';
  const items=MEDIA.filter(m=>
    (activeCat==="전체"||m.cat===activeCat||(activeCat==="타겟형 매체"&&m.group==="타겟형 매체"))&&
    (!query||haystack(m).includes(query.toLowerCase()))
  );
  document.getElementById('count').textContent=`${items.length}개 매체`;
  document.getElementById('empty').style.display=items.length?'none':'block';

  let lastGroup=null;
  items.forEach(m=>{
    if(m.group!==lastGroup){
      lastGroup=m.group;
      const g=document.createElement('div');
      g.className='group-label';
      g.textContent=m.group.toUpperCase();
      list.appendChild(g);
      if(m.group==="타겟형 매체"){
        const n=document.createElement('div');
        n.className='group-note';
        n.innerHTML=`연간 제휴 매체 — 정상 단가 대비 <b>30~60% 할인</b> · 별도 정산 없음(매월 배분) · <b>사업소별 월 1회</b> · 집행 <b>2~3주 전</b> 요청 · 요청: 팀즈 &gt; 미디어·바이럴 지원 라운지 · 담당 <b>김자영 책임</b><br><span class="ban-inline">APT LCD와 아파트앱은 다른 매체 — 희망 매체 구체 기재 필수</span>`;
        list.appendChild(n);
      }
    }
    const el=document.createElement('div');
    el.className='media';
    const first=m.slots[0];
    let slotsHtml=m.slots.map(s=>`
      <div class="slot">
        <div class="slot-name">${hl(s.name)}</div>
        <div class="slot-hero">${hl(s.size)}${/mm/.test(s.size)?'':(/[0-9]/.test(s.size)?'<small>px</small>':'')}</div>
        <div class="slot-meta"><b>${s.cap}</b> · ${hl(s.fmt)}</div>
        ${s.note?`<div class="slot-note">${hl(s.note)}</div>`:''}
      </div>`).join('');
    let extraHtml='';
    const extras = m.group==="타겟형 매체" ? {...(m.extra||{}), ...TARGET_COMMON} : (m.extra||{});
    if(Object.keys(extras).length){
      let dl='';
      for(const [k,v] of Object.entries(extras)){
        const ban=k==='금지사항'?' class="ban"':'';
        dl+=`<dt${ban}>${k}</dt><dd${ban}>${hl(v)}</dd>`;
      }
      extraHtml=`<dl class="spec-grid">${dl}</dl>`;
    }
    el.innerHTML=`
      <div class="media-head">
        <div class="m-id">
          <div class="m-cat">${m.cat}${m.reg?` · <span class="reg">${m.reg}</span>`:''}</div>
          <div class="m-name">${hl(m.name)}</div>
        </div>
        <div class="m-preview">
          <div class="m-size">${m.slots.length>1?m.slots.length+'개 지면':first.size}</div>
          <div class="m-due">요청 <b>${m.lead}</b></div>
        </div>
      </div>
      <div class="media-body">
        ${m.target?`<div class="m-target">${hl(m.target)}</div>`:''}
        ${slotsHtml}
        ${extraHtml}
        <div class="src${m.verified?'':' draft'}">${m.verified?"출처: '26.2 타겟형 매체 운영 가이드라인 (영업전략실 미디어콘텐츠팀)":"<b>검증 전 가안</b> — 담당 파트 확인 필요"}</div>
      </div>`;
    el.querySelector('.media-head').onclick=()=>el.classList.toggle('open');
    list.appendChild(el);
  });
}
render();
</script>
</body>
</html>
